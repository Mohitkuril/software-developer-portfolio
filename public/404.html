<!doctype html>
<!-- Built URL is /404.html — file lives in public/ only so Vite copies it to the site root (not /public/...). -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 | Mohit's Portfolio</title>
    <meta name="theme-color" content="#0d1117" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      :root {
        --bg: #0d1117;
        --panel: #161b22;
        --panel-2: #1f2630;
        --border: #2f3742;
        --text: #e6edf3;
        --muted: #9aa4b2;
        --accent: #58a6ff;
        --accent-2: #0078d4;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: radial-gradient(circle at 18% 8%, #17263a 0%, var(--bg) 42%, #0a0f15 100%);
        color: var(--text);
        font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      body {
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .shell {
        width: min(860px, 96vw);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
        background: var(--panel);
      }

      .menubar {
        height: 38px;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 12px;
        border-bottom: 1px solid var(--border);
        background: #303031;
        color: #d4d4d4;
        font-size: 12px;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }

      .dot.red {
        background: #ff5f57;
      }

      .dot.yellow {
        background: #febc2e;
      }

      .dot.green {
        background: #28c840;
      }

      .content {
        padding: clamp(22px, 4vw, 42px);
        background: linear-gradient(180deg, var(--panel-2), var(--panel));
      }

      .comment {
        margin: 0 0 14px;
        color: #6a9955;
        font-size: 12px;
      }

      .code {
        margin: 0;
        font-size: clamp(22px, 5vw, 38px);
        line-height: 1.25;
      }

      .code .n {
        color: #79c0ff;
      }

      .code .k {
        color: #ff7b72;
      }

      .lead {
        margin: 14px 0 22px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.6;
        max-width: 64ch;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 36px;
        padding: 0 14px;
        border-radius: 8px;
        border: 1px solid transparent;
        font: inherit;
        font-size: 12px;
        text-decoration: none;
        cursor: pointer;
      }

      .btn.primary {
        background: var(--accent-2);
        border-color: var(--accent);
        color: #fff;
      }

      .btn.secondary {
        background: #0f1722;
        border-color: var(--border);
        color: var(--text);
      }

      .status {
        height: 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 10px;
        background: var(--accent-2);
        color: #fff;
        border-top: 1px solid rgba(255, 255, 255, 0.16);
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <main class="shell" role="main">
      <div class="menubar">
        <span class="dot red"></span>
        <span class="dot yellow"></span>
        <span class="dot green"></span>
        <span>~/portfolio</span>
        <span style="opacity: 0.7">›</span>
        <span>404.tsx</span>
      </div>

      <section class="content">
        <p class="comment">// route_not_found.ts</p>
        <h1 class="code"><span class="k">throw</span> new <span class="n">Error</span>('404: Page Not Found')</h1>
        <p class="lead">
          The page you are looking for does not exist, was moved, or the URL is mistyped. You can jump back to the
          portfolio home and continue exploring.
        </p>
        <div class="actions">
          <a class="btn primary" href="/">Go to Home</a>
        </div>
      </section>

      <footer class="status">
        <span>⚠ NOT_FOUND</span>
        <span>Mohit Dark · 404</span>
      </footer>
    </main>
  </body>
</html>
